<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OnTrack — what this project uses</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, sans-serif;
         background: #14161a; color: #e7e9ee; }
  header { padding: 20px 24px; border-bottom: 1px solid #2a2e37; }
  h1 { margin: 0; font-size: 20px; }
  .sub { color: #9aa1ad; font-size: 13px; margin-top: 4px; }
  main { padding: 16px 24px 60px; max-width: 900px; margin: 0 auto; }
  .section { margin-top: 26px; }
  .section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .06em;
                color: #9aa1ad; margin: 0 0 10px; }
  .section.review h2  { color: #f0a35e; }
  .section.learning h2{ color: #6cb6ff; }
  .section.learned h2 { color: #5fd08a; }
  .section.ignored h2 { color: #7b818c; }
  .empty { color: #6b7280; font-size: 13px; font-style: italic; }
  .card { background: #1b1e24; border: 1px solid #2a2e37; border-radius: 10px;
          padding: 12px 14px; margin-bottom: 10px; }
  .card.child { margin-left: 22px; border-left: 2px solid #3a3f4b; }
  .row { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
  .name { font-weight: 600; }
  .kind { font-size: 11px; color: #9aa1ad; text-transform: uppercase; letter-spacing: .04em; }
  .what { color: #c3c8d2; font-size: 13.5px; margin: 4px 0 6px; }
  .meta { font-size: 12.5px; color: #9aa1ad; }
  .meta a { color: #6cb6ff; text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
  .where { font-family: ui-monospace, monospace; font-size: 12px; color: #8a919c; }
  .radios { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .radios label { font-size: 12.5px; padding: 3px 9px; border: 1px solid #3a3f4b;
                  border-radius: 999px; cursor: pointer; user-select: none; color: #c3c8d2; }
  .radios input { display: none; }
  .radios label.on { background: #2b3140; border-color: #6cb6ff; color: #fff; }
  .badge { font-size: 11px; color: #6b7280; }
</style>
</head>
<body>
<header>
  <h1>OnTrack</h1>
  <div class="sub">What this project uses. Mark what you know — go learn the rest. OnTrack points; it doesn't teach.</div>
</header>
<main id="app"><div class="empty">Loading…</div></main>

<script>
const STATUSES = [
  ["known", "Known"], ["somewhat", "Somewhat"],
  ["to_learn", "To learn"], ["ignored", "Ignore"],
];
// status -> section key
function sectionOf(status) {
  if (status === "known") return "learned";
  if (status === "somewhat" || status === "to_learn") return "learning";
  if (status === "ignored") return "ignored";
  return "review"; // unanswered
}
const SECTIONS = [
  ["review", "To Review"], ["learning", "Learning"],
  ["learned", "Learned"], ["ignored", "Ignored"],
];

let inventory = { items: [] };
let status = {}; // id -> status

async function load() {
  const [inv, pers] = await Promise.all([
    fetch("/inventory.json").then(r => r.json()),
    fetch("/personal.json").then(r => r.json()),
  ]);
  inventory = inv;
  status = (pers && pers.status) || {};
  render();
}

async function setStatus(id, value) {
  status[id] = value; // optimistic
  render();
  const res = await fetch("/status", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id, status: value }),
  });
  if (!res.ok) { alert("Failed to save status"); }
}

function ytLink(q) {
  return "https://www.youtube.com/results?search_query=" + encodeURIComponent(q);
}

function card(item) {
  const el = document.createElement("div");
  el.className = "card" + (item.parent ? " child" : "");
  const where = (item.where || []).join(", ");
  el.innerHTML = `
    <div class="row"><span class="name"></span><span class="kind"></span></div>
    <div class="what"></div>
    <div class="meta">
      <span class="where"></span>
      ${where ? " · " : ""}<a target="_blank" rel="noopener"></a>
    </div>
    <div class="radios"></div>`;
  el.querySelector(".name").textContent = item.name;
  el.querySelector(".kind").textContent = item.kind || "";
  el.querySelector(".what").textContent = item.what || "";
  el.querySelector(".where").textContent = where;
  const a = el.querySelector("a");
  a.href = ytLink(item.search || item.name);
  a.textContent = "search: " + (item.search || item.name);
  const radios = el.querySelector(".radios");
  const cur = status[item.id];
  for (const [val, label] of STATUSES) {
    const lab = document.createElement("label");
    lab.className = cur === val ? "on" : "";
    lab.innerHTML = `<input type="radio" name="s_${item.id}" value="${val}">${label}`;
    lab.querySelector("input").checked = cur === val;
    lab.querySelector("input").addEventListener("change", () => setStatus(item.id, val));
    radios.appendChild(lab);
  }
  return el;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  // group items by section; keep children next to their parent within a section
  const byId = Object.fromEntries(inventory.items.map(i => [i.id, i]));
  const buckets = { review: [], learning: [], learned: [], ignored: [] };
  for (const item of inventory.items) buckets[sectionOf(status[item.id])].push(item);

  for (const [key, title] of SECTIONS) {
    const items = buckets[key];
    const sec = document.createElement("section");
    sec.className = "section " + key;
    const count = items.length;
    sec.innerHTML = `<h2>${title} <span class="badge">${count}</span></h2>`;
    if (!count) {
      const e = document.createElement("div");
      e.className = "empty";
      e.textContent = "nothing here";
      sec.appendChild(e);
    } else {
      // parents first, each followed by its children present in this bucket
      const parents = items.filter(i => !i.parent);
      const children = items.filter(i => i.parent);
      const placed = new Set();
      for (const p of parents) {
        sec.appendChild(card(p)); placed.add(p.id);
        for (const c of children.filter(c => c.parent === p.id)) {
          sec.appendChild(card(c)); placed.add(c.id);
        }
      }
      for (const c of children) if (!placed.has(c.id)) sec.appendChild(card(c));
    }
    app.appendChild(sec);
  }
}

load();
</script>
</body>
</html>
