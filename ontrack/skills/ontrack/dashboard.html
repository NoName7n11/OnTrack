<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OnTrack — what this project taught you to build</title>
<style>
  :root {
    --paper:#f7f6f3; --raise:#fff; --ink:#1b1f1d; --muted:#5c665f; --faint:#8a938c;
    --line:#e2e0d8; --line2:#cfcdc2; --accent:#0f7a6b; --accent-soft:#e3f0ec;
    --tolearn:#2f6fb0; --somewhat:#b9781a; --code:#f1f0eb;
    --mono:ui-monospace,"SFMono-Regular","Menlo","Consolas",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --paper:#131614; --raise:#1b1f1c; --ink:#eaebe6; --muted:#a3aca4;
      --faint:#727c74; --line:#2a2f2b; --line2:#3a403a; --accent:#43b7a2;
      --accent-soft:#163029; --tolearn:#5e9ad8; --somewhat:#d3982f; --code:#1e2320; }
  }
  :root[data-theme="light"] { --paper:#f7f6f3; --raise:#fff; --ink:#1b1f1d; --muted:#5c665f;
    --faint:#8a938c; --line:#e2e0d8; --line2:#cfcdc2; --accent:#0f7a6b; --accent-soft:#e3f0ec;
    --tolearn:#2f6fb0; --somewhat:#b9781a; --code:#f1f0eb; }
  :root[data-theme="dark"] { --paper:#131614; --raise:#1b1f1c; --ink:#eaebe6; --muted:#a3aca4;
    --faint:#727c74; --line:#2a2f2b; --line2:#3a403a; --accent:#43b7a2; --accent-soft:#163029;
    --tolearn:#5e9ad8; --somewhat:#d3982f; --code:#1e2320; }

  * { box-sizing:border-box; }
  body { margin:0; background:var(--paper); color:var(--ink);
         font:16px/1.6 var(--sans); -webkit-font-smoothing:antialiased; }
  header { border-bottom:1px solid var(--line); padding:28px 24px; }
  .wrap { max-width:860px; margin:0 auto; }
  h1 { font-family:var(--mono); font-size:22px; font-weight:600; margin:0; letter-spacing:-.01em; }
  .sub { color:var(--muted); font-size:14px; margin-top:6px; max-width:62ch; }
  main { padding:8px 24px 80px; }
  .empty { color:var(--faint); font-size:13.5px; font-style:italic; }

  .kicker { font-family:var(--mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase;
            color:var(--faint); margin:32px 0 4px; display:flex; align-items:center; gap:10px; }
  .kicker .n { color:var(--accent); }
  h2 { font-family:var(--mono); font-size:19px; font-weight:600; margin:0 0 6px; letter-spacing:-.01em; }
  .lead { color:var(--muted); font-size:13.5px; margin:0 0 14px; max-width:62ch; }

  /* intake */
  .intake { background:var(--raise); border:1px solid var(--line); border-radius:10px; padding:20px; margin-top:20px; }
  .intake p { margin:0 0 14px; color:var(--muted); font-size:14.5px; }
  .levels { display:flex; flex-wrap:wrap; gap:10px; }
  .levels button { flex:1 1 160px; font:inherit; text-align:left; cursor:pointer;
    background:var(--paper); border:1px solid var(--line2); border-radius:8px; padding:12px 14px; color:var(--ink); }
  .levels button:hover { border-color:var(--accent); }
  .levels button.on { border-color:var(--accent); background:var(--accent-soft); }
  .levels b { display:block; font-size:14.5px; }
  .levels small { color:var(--faint); font-size:12.5px; }

  /* derived-level banner */
  .levelbar { background:var(--accent-soft); border:1px solid var(--accent); border-radius:10px;
              padding:14px 16px; margin:18px 0 8px; }
  .levelbar .lv { font-family:var(--mono); font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); }
  .levelbar .big { font-size:19px; font-weight:700; margin:2px 0; }
  .levelbar .why { color:var(--muted); font-size:13px; }
  .levelbar .prov { color:var(--faint); font-style:italic; }

  /* question cards */
  .qcard { background:var(--raise); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:12px; }
  .badges { display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; align-items:center; }
  .badge { font-family:var(--mono); font-size:11px; letter-spacing:.04em; padding:2px 8px;
           border-radius:3px; border:1px solid currentColor; font-weight:600; }
  .b-dom { color:var(--tolearn); } .b-mode { color:var(--accent); } .b-sr { color:var(--faint); }
  .b-tier { color:var(--somewhat); }
  .qp { font-weight:600; font-size:15.5px; margin:0 0 10px; }
  .opts { display:flex; flex-direction:column; gap:7px; }
  .opt { display:flex; align-items:center; gap:9px; padding:8px 11px; border:1px solid var(--line2);
         border-radius:7px; cursor:pointer; font-size:14px; color:var(--ink); background:var(--paper); }
  .opt:hover { border-color:var(--accent); }
  .opt .r { width:14px; height:14px; border-radius:50%; border:1.5px solid var(--line2); flex:none; }
  .opt.sel { border-color:var(--accent); background:var(--accent-soft); }
  .opt.sel .r { border-color:var(--accent); background:radial-gradient(var(--accent) 0 4px, transparent 5px); }
  .note { margin-top:10px; width:100%; font:13px var(--mono); color:var(--ink); background:var(--paper);
          border:1px dashed var(--line2); border-radius:6px; padding:8px 10px; resize:vertical; }
  .qactions { margin-top:10px; display:flex; gap:8px; align-items:center; }
  .qsend { font:inherit; font-size:13.5px; cursor:pointer; color:#fff; background:var(--accent);
           border:none; border-radius:6px; padding:7px 16px; }
  .qsend:disabled { opacity:.45; cursor:not-allowed; }
  .qskip { font:inherit; font-size:13px; cursor:pointer; color:var(--faint); background:none;
           border:none; text-decoration:underline; padding:7px 4px; }

  .optnote { color:var(--faint); font-size:13px; margin:0 0 12px; }
  .optnote button { font:inherit; font-size:13px; color:var(--accent); background:none; border:none;
                    cursor:pointer; text-decoration:underline; padding:0; }

  /* learning path */
  .bucket { margin-bottom:20px; }
  .bh { font-family:var(--mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase;
        color:var(--accent); margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .bh::after { content:""; flex:1; height:1px; background:var(--line); }
  .pstep { display:grid; grid-template-columns:auto 1fr; gap:12px; padding:9px 0; border-bottom:1px solid var(--line); align-items:baseline; }
  .pstep:last-child { border-bottom:none; }
  .pn { font-family:var(--mono); font-size:13px; color:var(--faint); font-weight:700; }
  .pt { font-size:15px; font-weight:600; }
  .tag { font-family:var(--mono); font-size:10px; border-radius:3px; padding:0 5px;
         margin-left:8px; letter-spacing:.04em; vertical-align:1px; border:1px solid currentColor; }
  .t-review { color:var(--somewhat); } .t-prereq { color:var(--tolearn); } .t-suggested { color:var(--faint); }
  .pwhat { color:var(--muted); font-size:13.5px; font-weight:400; margin-top:2px; }
  .pmeta { font-size:12.5px; margin-top:3px; display:flex; gap:10px; flex-wrap:wrap; }
  .pmeta .where { font-family:var(--mono); color:var(--faint); }
  .pmeta a { color:var(--accent); text-decoration:none; }
  .pmeta a:hover { text-decoration:underline; }
  .done { color:var(--faint); font-size:13px; margin-top:6px; }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>OnTrack</h1>
    <div class="sub">A few questions place your level, then OnTrack turns the gaps into a study path pitched for you. It points you at what to learn — it doesn't teach it.</div>
  </div>
</header>
<main class="wrap" id="app"><div class="empty">Loading…</div></main>

<script>
const LEVELS = [
  ["beginner", "Beginner", "New to most of this — start me from the basics."],
  ["intermediate", "Intermediate", "Comfortable with fundamentals; focus me on the newer parts."],
  ["expert", "Expert", "Experienced — only surface the advanced gaps."],
];
const LEVEL_LABEL = { beginner:"Beginner", intermediate:"Intermediate", expert:"Expert" };
const DOMAIN_ORDER = ["language", "framework", "system-design", "security", "tooling", "other"];
const DOMAIN_LABEL = { "language":"Language", "framework":"Framework",
  "system-design":"System design", "security":"Security", "tooling":"Tooling", "other":"Other" };
const TIER_RANK = { basic:0, intermediate:1, advanced:2 };
const SELF_STATE = { "Confident":"learned", "Shaky":"review", "New":"learn" };

// benchmark tuning — how much signal we need before trusting the quiz over the
// declared level, and per-tier before a tier can promote you.
const MIN_SIGNAL = 3;   // placement graded+tiered answers before the quiz overrides declared
const MIN_TIER = 2;     // answers within a tier before it can set the level

let inventory = { items: [] };
let questions = [];
let personal = { answers: {} };
let invById = {};
let qByConcept = {};
const skipped = new Set();   // session-only: optional questions the user skipped

async function load() {
  const [inv, qs, pers] = await Promise.all([
    fetch("/inventory.json").then(r => r.json()),
    fetch("/questions.json").then(r => r.json()),
    fetch("/personal.json").then(r => r.json()),
  ]);
  inventory = inv || { items: [] };
  questions = (qs && qs.questions) || [];
  personal = pers && typeof pers === "object" ? pers : {};
  personal.answers = personal.answers || {};
  invById = Object.fromEntries((inventory.items || []).map(i => [i.id, i]));
  qByConcept = {};
  for (const q of questions) if (!(q.concept in qByConcept)) qByConcept[q.concept] = q;
  render();
}

async function postJSON(path, body) {
  const res = await fetch(path, { method:"POST",
    headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) });
  if (!res.ok) { let m="save failed"; try { m=(await res.json()).error||m; } catch(e){} throw new Error(m); }
  return res.json();
}

async function setLevel(level) {
  const prev = personal.level;
  personal.level = level; render();
  try { await postJSON("/level", { level }); }
  catch (e) { personal.level = prev; render(); alert(e.message); }
}

async function submitAnswer(q, payload) {
  try {
    const res = await postJSON("/answer", Object.assign({ question_id: q.id }, payload));
    if (res && res.answers) personal.answers = res.answers;
    render();
  } catch (e) { alert(e.message); }
}

// knowledge state from one question's answer
function stateOf(q) {
  const a = personal.answers[q.id];
  if (!a) return "unanswered";
  if (q.mode === "graded") return a.correct ? "learned" : "learn";
  return SELF_STATE[a.self] || "review";
}

// derive the real level from placement graded, tiered answers — tier-ceiling:
// the hardest tier you mostly get right wins; missing basics never demotes you.
function derivedLevel() {
  const declared = personal.level || "beginner";
  const scored = questions.filter(q =>
    q.placement && q.mode === "graded" && q.level in TIER_RANK && personal.answers[q.id]);
  if (scored.length < MIN_SIGNAL) {
    return { level: declared, provisional: true,
      why: "answer a few more placement questions to confirm — using your declared level for now." };
  }
  const tier = t => {
    const qs = scored.filter(q => q.level === t);
    const ok = qs.filter(q => personal.answers[q.id].correct).length;
    return { n: qs.length, ok, rate: qs.length ? ok / qs.length : 0 };
  };
  const adv = tier("advanced"), inter = tier("intermediate"), basic = tier("basic");
  if (adv.n >= MIN_TIER && adv.rate >= 0.5)
    return { level: "expert", why: `you answered ${adv.ok}/${adv.n} advanced questions correctly.` };
  if (inter.n >= MIN_TIER && inter.rate >= 0.5)
    return { level: "intermediate", why: `solid on intermediate (${inter.ok}/${inter.n}); advanced still to prove.` };
  return { level: "beginner", why: `basics are the place to start (${basic.ok}/${basic.n} so far).` };
}

// which untested concept tiers appear for a given level
function showUntested(level, tier) {
  if (level === "beginner") return true;
  if (level === "intermediate") return tier !== "basic";
  return tier === "advanced";   // expert
}

function ytLink(s) { return "https://www.youtube.com/results?search_query=" + encodeURIComponent(s); }
function el(tag, cls, txt) { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; }

function intakeCard() {
  const box = el("div", "intake");
  box.appendChild(el("p", null, "Where are you at overall? This is just a starting point — your answers below refine it, and the quiz result is what actually sets your path."));
  const row = el("div", "levels");
  for (const [val, label, desc] of LEVELS) {
    const b = el("button", personal.level === val ? "on" : null);
    b.appendChild(el("b", null, label));
    b.appendChild(el("small", null, desc));
    b.addEventListener("click", () => setLevel(val));
    row.appendChild(b);
  }
  box.appendChild(row);
  return box;
}

function questionCard(q, optional) {
  const c = el("div", "qcard");
  const badges = el("div", "badges");
  badges.appendChild(el("span", "badge b-dom", q.domain));
  badges.appendChild(el("span", "badge " + (q.mode === "graded" ? "b-mode" : "b-sr"),
    q.mode === "graded" ? "graded" : "self-report"));
  if (q.level) badges.appendChild(el("span", "badge b-tier", q.level));
  c.appendChild(badges);
  c.appendChild(el("p", "qp", q.prompt));

  const opts = el("div", "opts");
  let picked = null;
  const optEls = [];
  (q.options || []).forEach((label, i) => {
    const o = el("div", "opt");
    o.appendChild(el("span", "r"));
    o.appendChild(el("span", null, label));
    o.addEventListener("click", () => {
      picked = i; optEls.forEach((x, j) => x.classList.toggle("sel", j === i));
      send.disabled = false;
    });
    optEls.push(o); opts.appendChild(o);
  });
  c.appendChild(opts);

  let noteEl = null;
  if (q.mode === "self_report") {
    noteEl = el("textarea", "note"); noteEl.rows = 2;
    noteEl.placeholder = "optional: what specifically is fuzzy?";
    c.appendChild(noteEl);
  }
  const actions = el("div", "qactions");
  const send = el("button", "qsend", "Save answer"); send.disabled = true;
  send.addEventListener("click", () => {
    if (picked == null) return;
    if (q.mode === "graded") submitAnswer(q, { choice: picked });
    else submitAnswer(q, { self: q.options[picked], note: noteEl && noteEl.value.trim() });
  });
  actions.appendChild(send);
  if (optional) {
    const skip = el("button", "qskip", "Skip");
    skip.addEventListener("click", () => { skipped.add(q.id); render(); });
    actions.appendChild(skip);
  }
  c.appendChild(actions);
  return c;
}

// Build the ordered learning path from the whole concept inventory, filtered by
// the derived level. Answered gaps always appear; untested concepts appear by
// level; foundational prereqs appear only for beginners.
function buildPath(level) {
  const steps = [];
  for (const item of inventory.items || []) {
    const q = qByConcept[item.id];
    const st = q ? stateOf(q) : "untested";
    if (st === "learned") continue;                       // knew it — drop
    if (st === "learn" || st === "review") {              // confirmed gap — always
      steps.push({ item, q, kind: st === "review" ? "review" : "gap" });
      continue;
    }
    // untested (no question, or question unanswered)
    if (item.kind !== "concept") continue;                // only concepts fill gaps
    if (item.confidence === "foundational") {
      if (level === "beginner") steps.push({ item, q: null, kind: "prereq" });
      continue;
    }
    const tier = item.level || "intermediate";
    if (showUntested(level, tier)) steps.push({ item, q: null, kind: "suggested" });
  }
  return steps;
}

function domainOf(step) {
  return step.item.domain || (step.q && step.q.domain) || "other";
}

function pathStep(step, n) {
  const item = step.item;
  const wrap = el("div", "pstep");
  wrap.appendChild(el("span", "pn", n + "."));
  const body = el("div");
  const t = el("div", "pt", item.name || item.id);
  const TAG = { review:["review","t-review"], prereq:["prereq","t-prereq"], suggested:["suggested","t-suggested"] };
  if (TAG[step.kind]) { const [txt, cls] = TAG[step.kind]; t.appendChild(el("span", "tag " + cls, txt)); }
  body.appendChild(t);
  if (item.what) body.appendChild(el("div", "pwhat", item.what));
  const meta = el("div", "pmeta");
  const where = (item.where || []).join(", ");
  if (where) meta.appendChild(el("span", "where", where));
  const a = el("a", null, "search ›"); a.href = ytLink(item.search || item.name || item.id);
  a.target = "_blank"; a.rel = "noopener"; meta.appendChild(a);
  body.appendChild(meta);
  wrap.appendChild(body);
  return wrap;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  if (!personal.level) {
    const k = el("div", "kicker"); k.appendChild(el("span", null, "Start here"));
    app.appendChild(k);
    app.appendChild(el("h2", null, "Set your level"));
    app.appendChild(intakeCard());
    return;
  }

  // derived-level banner
  const d = derivedLevel();
  const bar = el("div", "levelbar");
  bar.appendChild(el("div", "lv", "Your level"));
  bar.appendChild(el("div", "big", LEVEL_LABEL[d.level] || d.level));
  bar.appendChild(el("div", "why" + (d.provisional ? " prov" : ""), d.why));
  app.appendChild(bar);

  // split unanswered questions into placement (required) + optional
  const unanswered = questions.filter(q => !personal.answers[q.id]);
  const placement = unanswered.filter(q => q.placement);
  const optional = unanswered.filter(q => !q.placement && !skipped.has(q.id));

  const pk = el("div", "kicker");
  pk.appendChild(el("span", "n", "01")); pk.appendChild(el("span", null, "Placement"));
  app.appendChild(pk);
  app.appendChild(el("h2", null, "Place your level"));
  app.appendChild(el("p", "lead", "A few quick questions so the path is pitched right — this isn't a test, and there's no grade to chase."));
  if (placement.length) {
    for (const q of placement) app.appendChild(questionCard(q, false));
  } else {
    app.appendChild(el("div", "done", questions.length
      ? "Placement done — your level above reflects your answers."
      : "No questions yet. Run /ontrack to scan the project and generate them."));
  }

  // optional deeper questions
  if (optional.length) {
    const ok = el("div", "kicker");
    ok.appendChild(el("span", "n", "02")); ok.appendChild(el("span", null, "More questions"));
    app.appendChild(ok);
    app.appendChild(el("h2", null, "Sharpen the path (optional)"));
    app.appendChild(el("p", "lead", "Answer any of these to pin down exactly what you know — or skip them all. They fine-tune the path; they don't gate it."));
    for (const q of optional) app.appendChild(questionCard(q, true));
  }

  // learning path
  const lk = el("div", "kicker");
  lk.appendChild(el("span", "n", optional.length ? "03" : "02"));
  lk.appendChild(el("span", null, "Learning path"));
  app.appendChild(lk);
  app.appendChild(el("h2", null, "What to go learn, in order"));
  app.appendChild(el("p", "lead", "Pitched for " + (LEVEL_LABEL[d.level] || d.level) +
    ". Things you got wrong always show; the rest is filtered to your level."));

  const steps = buildPath(d.level);
  if (!steps.length) {
    app.appendChild(el("div", "empty", "Nothing to learn here — either you knew it, or your level filters it out."));
    return;
  }
  const byDomain = {};
  for (const s of steps) (byDomain[domainOf(s)] = byDomain[domainOf(s)] || []).push(s);
  const domains = Object.keys(byDomain).sort(
    (a, b) => DOMAIN_ORDER.indexOf(a) - DOMAIN_ORDER.indexOf(b));
  for (const dom of domains) {
    const group = byDomain[dom].sort((a, b) =>
      (TIER_RANK[a.item.level] ?? 1) - (TIER_RANK[b.item.level] ?? 1) ||
      (a.item.id < b.item.id ? -1 : 1));
    const bucket = el("div", "bucket");
    bucket.appendChild(el("div", "bh", DOMAIN_LABEL[dom] || dom));
    group.forEach((s, i) => bucket.appendChild(pathStep(s, i + 1)));
    app.appendChild(bucket);
  }
}

load();
</script>
</body>
</html>
